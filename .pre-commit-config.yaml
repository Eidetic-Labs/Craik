repos:
  - repo: local
    hooks:
      - id: max-file-lines
        name: Enforce maximum Python file length
        entry: python scripts/check_max_file_lines.py
        language: system
        files: ^src/.*\.py$
        pass_filenames: true
      - id: doc-links
        name: Validate raw-HTML <a href> links in docs
        entry: python scripts/check_doc_links.py
        language: system
        files: ^docs/.*\.(md|mdx)$
        pass_filenames: false
