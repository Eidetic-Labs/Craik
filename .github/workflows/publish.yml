name: Publish

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Set to true to publish after building artifacts."
        required: true
        default: "false"
  push:
    tags:
      - "v0.1.0"

permissions:
  contents: read
  id-token: write

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Check version consistency
        run: python scripts/check_version_consistency.py
      - name: Check 0.1.0 release tag
        if: github.event_name == 'push'
        run: python scripts/check_release_tag.py --tag "${GITHUB_REF_NAME}" --expected-version "0.1.0"
      - name: Check release readiness docs
        run: python scripts/check_release_readiness.py
      - name: Build package
        run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*
      - name: Smoke install wheel
        shell: bash
        run: |
          python -m venv .venv-package-smoke
          source .venv-package-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          craik --version
          python -c "import craik; print(craik.__version__)"
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: craik-dist
          path: dist/
          retention-days: 30

  publish-pypi:
    needs: build-package
    if: github.event_name == 'push' && github.ref == 'refs/tags/v0.1.0'
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: craik-dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
