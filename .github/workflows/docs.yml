name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

jobs:
  docusaurus-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Craik for docs checks
        run: python -m pip install --upgrade pip && python -m pip install -e .
      - name: Check generated CLI reference
        run: python scripts/generate_cli_reference.py --check
      - name: Check public docs hygiene
        run: python scripts/check_public_docs_hygiene.py
      - name: Check doc links (raw HTML <a href>)
        run: python scripts/check_doc_links.py
      - name: Install docs dependencies
        working-directory: docs
        run: npm ci
      - name: Build docs
        working-directory: docs
        run: npm run build
      - name: Upload docs build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: docs/build
          retention-days: 14
