name: Package

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "src/**"
      - "README.md"
      - "CHANGELOG.md"
      - "docs/guides/release-management.md"
      - "docs/security/release-process.md"
      - "scripts/check_version_consistency.py"
      - "scripts/check_release_readiness.py"
      - ".github/workflows/package.yml"
      - ".github/workflows/publish.yml"
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
      - "src/**"
      - "README.md"
      - "CHANGELOG.md"
      - "docs/guides/release-management.md"
      - "docs/security/release-process.md"
      - "scripts/check_version_consistency.py"
      - "scripts/check_release_readiness.py"
      - ".github/workflows/package.yml"
      - ".github/workflows/publish.yml"

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Check version consistency
        run: python scripts/check_version_consistency.py
      - name: Check release readiness docs
        run: python scripts/check_release_readiness.py
      - name: Build package artifacts
        run: python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*
      - name: Smoke install wheel
        shell: bash
        run: |
          python -m venv .venv-package-smoke
          source .venv-package-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          craik --version
          python -c "import craik; print(craik.__version__)"
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: craik-package-dist
          path: dist/
          retention-days: 14
